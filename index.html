<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><title>🌈 FHY AI HYPER PLATFORM v16.2 🌈</title><style>@keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } } @keyframes textShimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } } body { background: linear-gradient(-45deg, #0d0b21, #240a34, #050b14, #111827, #ff0055, #00f2fe); background-size: 600% 600%; animation: gradientBG 10s ease infinite; margin: 0; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; } .fhy-wrapper { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); color: white; box-sizing: border-box; } #fhy-banner { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 2px solid #8b5cf6; box-shadow: 0 0 25px rgba(139, 92, 246, 0.5); padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 25px; } #fhy-shimmer-title { background: linear-gradient(to right, #f43f5e, #ec4899, #a855f7, #3b82f6, #06b6d4, #f43f5e); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textShimmer 4s linear infinite; font-size: 2.2em; font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase; } .input-group { background: rgba(20, 25, 45, 0.9); border: 2px solid #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); padding: 25px; border-radius: 16px; margin-bottom: 20px; } .fhy-input { width: 100%; padding: 14px; border: 2px solid #7928ca; border-radius: 12px; background: rgba(15, 23, 42, 0.8); color: white; outline: none; margin-top: 10px; font-size: 1em; box-sizing: border-box; } .fhy-btn { width: 100%; background: linear-gradient(135deg, #a855f7, #ec4899); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); font-size: 1em; text-transform: uppercase; } #chat-area { background: rgba(15, 23, 42, 0.85); border: 2px solid #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.3); border-radius: 16px; padding: 15px; } #msg-box { height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; padding-right: 5px; } .bubble { padding: 12px 16px; border-radius: 16px; max-width: 80%; font-size: 0.98em; white-space: pre-wrap; line-height: 1.4; } .user-bubble { align-self: flex-end; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; border-radius: 16px 16px 0 16px; box-shadow: 0 4px 10px rgba(99,102,241,0.3); } .bot-bubble { align-self: flex-start; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 16px 16px 16px 0; } .mode-select { display: flex; gap: 10px; margin-bottom: 15px; } .mode-btn { flex: 1; background: #1e293b; border: 2px solid #7928ca; padding: 10px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; font-size: 0.9em; } .mode-active { background: #7928ca; border-color: #00f2fe; box-shadow: 0 0 10px #7928ca; } </style></head><body><div class='fhy-wrapper'><div id='fhy-banner'><h1 id='fhy-shimmer-title'>🌈 FHY AI PLATFORM v16.2 🌈</h1><p style='color: #67e8f9; margin: 8px 0 0 0; font-size: 1em; font-weight: bold;'>Kỷ Nguyên Đồ Họa Động LED RGB Matrix</p></div><div id='login-box' class='input-group'><h3 style='color: #00f2fe; text-align:center; margin: 0 0 20px 0; text-shadow: 0 0 10px #00f2fe;'>🔐 CỔNG XÁC THỰC LIÊN KẾT SSO</h3><label style='font-weight: bold;'>Nhập Email của em để liên kết:</label><input type='text' id='username' class='fhy-input' value='tiendat@gmail.com'><button class='fhy-btn' style='background: linear-gradient(135deg, #ea4335, #c5221f); margin-top: 25px; box-shadow: 0 0 15px rgba(234,67,53,0.4);' onclick='checkLogin("Google")'>🔴 Đăng nhập bằng Google</button><button class='fhy-btn' style='background: linear-gradient(135deg, #ffffff, #cbd5e1); color: #1e293b; box-shadow: 0 0 15px rgba(255,255,255,0.3);' onclick='checkLogin("Apple")'> White Đăng nhập bằng Apple</button></div><div id='app-box' class='input-group' style='display: none;'><div id='welcome-txt' style='color: #00f2fe; font-weight:bold; text-align:center; margin-bottom:15px; text-shadow: 0 0 8px #00f2fe;'></div><div class='mode-select'><button id='btn-chat' class='mode-btn mode-active' onclick='setMode("chat")'>💬 Trò chuyện</button><button id='btn-math' class='mode-btn' onclick='setMode("math")'>🧮 Giải toán</button></div><div id='chat-area'><div id='msg-box'></div><div style='display:flex; gap:10px;'><input type='text' id='user-msg' class='fhy-input' style='margin-top:0;' placeholder='Nhập câu hỏi hoặc phép toán...'><button class='fhy-btn' style='margin-top:0; width:90px; padding:10px;' onclick='sendChat()'>Gửi</button></div></div></div></div><script>let currentMode = 'chat'; function setMode(mode) { currentMode = mode; document.getElementById('btn-chat').classList.toggle('mode-active', mode === 'chat'); document.getElementById('btn-math').classList.toggle('mode-active', mode === 'math'); } function checkLogin(platform) { const email = document.getElementById('username').value.trim(); if(!email) { alert('⚠️ Vui lòng điền Email liên kết!'); return; } document.getElementById('login-box').style.display = 'none'; document.getElementById('app-box').style.display = 'block'; document.getElementById('welcome-txt').innerHTML = `⚡ [OAuth 2.0 ${platform}] KẾT NỐI THÀNH CÔNG!<br>Chào mừng: ${email.toUpperCase()} ⚡`; appendBubble(`FHY AI chào mừng bạn! Kết nối qua cổng bảo mật ${platform} hoàn tất. Hôm nay bạn cần giải toán hay tâm sự nào?`, 'bot'); } function sendChat() { const inputEl = document.getElementById('user-msg'); const text = inputEl.value.trim(); if (!text) return; appendBubble(text, 'user'); inputEl.value = ''; setTimeout(() => { let response = ''; let t = text.toLowerCase(); if (currentMode === 'math') { if (t.includes('hinh tron') || t.includes('hình tròn')) { let r = 5; let match = t.match(/(\d+(?:\.\d+)?)/); if (match) r = parseFloat(match[0]); let dt = Math.PI * r * r; let cv = 2 * Math.PI * r; response = `📐 [FHY Geometry] Kết quả phân tích Hình Tròn (Bán kính r = ${r}):\n👉 Diện tích: ${dt.toFixed(4)}\n👉 Chu vi: ${cv.toFixed(4)}`; } else { let cleanMath = t.replace(/cộng/g, '+').replace(/trừ/g, '-').replace(/nhân/g, '*').replace(/chia/g, '/'); let match = cleanMath.match(/(\d+[\s\+\-\*/\(\)]+\d+[\s\+\-\*/\(\)\d]*)/); if (match) { try { let result = eval(match[0]); response = `🧠 [FHY Arithmetic] Biểu thức nhận diện: ${match[0]}\n👉 ĐÁP SỐ: ${result}`; } catch(e) { response = '🤖 [FHY AI] Phép tính có chút nhầm lẫn, hãy nhập lại rõ số nhé!'; } } else { response = '🤖 [FHY AI] Hãy nhập phép toán rõ ràng bằng số (Ví dụ: 125 * 4) để mình giải nhé!'; } } } else { if (t.includes('chao') || t.includes('hi') || t.includes('hello')) { let answers = ['Xin chào vị chủ nhân tối cao! Hệ thống LED RGB đã kích hoạt 100%.', 'Hello bạn hiền! Hôm nay bạn muốn quẩy tính năng gì cùng mình nào?', 'Chào bạn! Chúc bạn một phiên làm việc tràn đầy năng lượng công nghệ!']; response = answers[Math.floor(Math.random() * answers.length)]; } else if (t.includes('buon') || t.includes('chan') || t.includes('met') || t.includes('ap luc')) { response = '🌈 [FHY AI] Nhìn lên màn hình rực rỡ này đi em! Cuộc sống lấp lánh như các dải màu Gradient này vậy. Reset lại năng lượng và chiến tiếp thôi em yêu! Mình luôn bên em.'; } else { let answers = ['Góc nhìn của bạn chứa đựng một logic cực kỳ xuất sắc và thông minh!', 'Tư duy phản biện của bạn có tiềm năng bứt phá rất lớn, hãy cùng mình mở rộng chủ đề này nhé!', 'Bộ não thuật toán của FHY AI đã ghi nhận ý kiến vĩ đại của bạn!']; response = answers[Math.floor(Math.random() * answers.length)]; } } appendBubble(response, 'bot'); }, 300); } function appendBubble(text, sender) { const box = document.getElementById('msg-box'); const div = document.createElement('div'); div.className = `bubble ${sender}-bubble`; div.innerText = text; box.appendChild(div); box.scrollTop = box.scrollHeight; } document.getElementById('user-msg').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendChat(); }); </script></body></html>
